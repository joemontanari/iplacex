<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Notas - Ejercicio 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Formulario de Notas</h1>
        
        <form method="POST" action="{{ url_for('formulario_notas') }}">
            <div class="form-group">
                <label for="nota1">Nota 1:</label>
                <input type="number" id="nota1" name="nota1" min="10" max="70" required>
            </div>
            
            <div class="form-group">
                <label for="nota2">Nota 2:</label>
                <input type="number" id="nota2" name="nota2" min="10" max="70" required>
            </div>
            
            <div class="form-group">
                <label for="nota3">Nota 3:</label>
                <input type="number" id="nota3" name="nota3" min="10" max="70" required>
            </div>
            
            <div class="form-group">
                <label for="asistencia">Asistencia (%):</label>
                <input type="number" id="asistencia" name="asistencia" min="0" max="100" required>
            </div>
            
            <button type="submit" class="boton">Enviar</button>
        </form>
        
        {% if promedio and estado %}
        <div class="resultado {% if 'APROBADO' in estado %}resultado-aprobado{% else %}resultado-reprobado{% endif %}">
            <h2>Resultados:</h2>
            <p><strong>Promedio:</strong> {{ promedio }}</p>
            <p class="{% if 'APROBADO' in estado %}aprobado{% else %}reprobado{% endif %}">
                <strong>Estado:</strong> {{ estado }}
            </p>
        </div>
        {% endif %}
        
        <a href="{{ url_for('index') }}" class="boton-volver">Volver al inicio</a>
    </div>
</body>
</html>
